<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>EUREKA · Tutor IA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <!-- KaTeX para fórmulas -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    <!-- marked -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        :root{
            --bg:#f7f6f2;--surface:#fff;--border:#e2e0d8;--text:#1a1814;--muted:#8a8680;
            --accent:#2a52d4;--accent-light:#eef1fc;--accent-dark:#1a3aa8;
            --amber:#b45309;--amber-light:#fef3e2;
            --red:#dc2626;--red-light:#fef2f2;
            --green:#15803d;--green-light:#f0fdf4;
            --shadow:0 1px 3px rgba(0,0,0,.08),0 4px 12px rgba(0,0,0,.04);
            --shadow-lg:0 4px 16px rgba(0,0,0,.10),0 1px 4px rgba(0,0,0,.06);
            --radius:12px;
        }
        *{box-sizing:border-box;margin:0;padding:0;}
        body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);height:100dvh;display:flex;flex-direction:column;overflow:hidden;font-size:15px;}

        /* ── HEADER ── */
        header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 16px;height:54px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;box-shadow:var(--shadow);z-index:100;}
        .logo{display:flex;align-items:center;gap:9px;}
        .logo-badge{width:32px;height:32px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-weight:700;color:#fff;font-size:14px;flex-shrink:0;}
        .logo-text{font-family:'Space Mono',monospace;font-weight:700;font-size:16px;letter-spacing:-.5px;}
        .logo-sub{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;line-height:1;}
        #auth-area{display:flex;align-items:center;gap:8px;position:relative;}

        /* quota */
        #quota-badge{font-size:10px;font-family:'Space Mono',monospace;color:var(--muted);background:var(--bg);border:1px solid var(--border);padding:2px 7px;border-radius:20px;white-space:nowrap;}
        #quota-badge.warning{color:var(--amber);border-color:var(--amber);background:var(--amber-light);}
        #quota-badge.danger{color:var(--red);border-color:var(--red);background:var(--red-light);}

        /* dropdown */
        .user-menu-wrap{position:relative;}
        .user-trigger{display:flex;align-items:center;gap:6px;background:var(--bg);border:1px solid var(--border);border-radius:24px;padding:3px 9px 3px 3px;cursor:pointer;transition:border-color .15s;}
        .user-trigger:hover{border-color:var(--accent);}
        .user-trigger img{width:24px;height:24px;border-radius:50%;object-fit:cover;}
        .user-trigger .uname{font-size:12px;font-weight:500;max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
        .user-trigger .chevron{font-size:9px;color:var(--muted);transition:transform .2s;}
        .user-trigger.open .chevron{transform:rotate(180deg);}
        .user-dropdown{position:absolute;top:calc(100% + 8px);right:0;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow-lg);min-width:210px;overflow:hidden;display:none;z-index:200;}
        .user-dropdown.open{display:block;animation:fadeDown .15s ease;}
        @keyframes fadeDown{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
        .dd-header{padding:11px 13px;border-bottom:1px solid var(--border);background:var(--bg);}
        .dd-name{font-size:13px;font-weight:600;}
        .dd-email{font-size:11px;color:var(--muted);margin-top:1px;word-break:break-all;}
        .dd-item{display:flex;align-items:center;gap:9px;padding:9px 13px;font-size:13px;cursor:pointer;transition:background .12s;border:none;background:none;width:100%;text-align:left;color:var(--text);}
        .dd-item:hover{background:var(--bg);}
        .dd-item.danger{color:var(--red);}
        .dd-item.danger:hover{background:var(--red-light);}
        .dd-sep{height:1px;background:var(--border);}

        /* login btn */
        .btn-login{background:var(--accent);color:#fff;border:none;padding:7px 14px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;display:flex;align-items:center;gap:7px;transition:background .15s;}
        .btn-login:hover{background:var(--accent-dark);}

        /* ── SUBJECT BAR ── */
        #subject-bar{display:flex;gap:5px;padding:8px 12px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;overflow-x:auto;-webkit-overflow-scrolling:touch;}
        #subject-bar::-webkit-scrollbar{display:none;}
        .subj-btn{font-size:11px;font-weight:600;padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:var(--bg);color:var(--muted);cursor:pointer;font-family:'Space Mono',monospace;transition:all .15s;white-space:nowrap;flex-shrink:0;}
        .subj-btn:hover{color:var(--accent);border-color:var(--accent);background:var(--accent-light);}
        .subj-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);}

        /* ── CHAT ── */
        #chat-box{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;scroll-behavior:smooth;}
        #chat-box::-webkit-scrollbar{width:3px;}
        #chat-box::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
        .msg-row{display:flex;gap:8px;width:100%;max-width:760px;}
        .msg-row.user{align-self:flex-end;flex-direction:row-reverse;max-width:90%;}
        .msg-row.stay{align-self:flex-start;max-width:95%;}
        .msg-avatar{width:28px;height:28px;border-radius:7px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-size:10px;font-weight:700;margin-top:2px;}
        .msg-avatar.stay-av{background:var(--accent);color:#fff;}
        .msg-avatar.user-av{background:var(--text);color:#fff;}
        .bubble{padding:10px 13px;border-radius:11px;font-size:14px;line-height:1.65;max-width:100%;box-shadow:var(--shadow);}
        .bubble.stay{background:var(--surface);border:1px solid var(--border);border-top-left-radius:3px;}
        .bubble.user{background:var(--accent);color:#fff;border-top-right-radius:3px;}
        /* markdown */
        .bubble.stay strong{color:var(--accent);font-weight:600;}
        .bubble.stay em{color:var(--amber);}
        .bubble.stay p{margin-bottom:7px;}.bubble.stay p:last-child{margin-bottom:0;}
        .bubble.stay ul,.bubble.stay ol{padding-left:16px;margin-bottom:7px;}
        .bubble.stay li{margin-bottom:3px;}
        .bubble.stay h3,.bubble.stay h4{font-size:14px;font-weight:600;color:var(--accent);margin:8px 0 4px;}
        .bubble.stay code{font-family:'Space Mono',monospace;font-size:11px;background:var(--bg);padding:1px 4px;border-radius:3px;border:1px solid var(--border);}
        .bubble.stay pre{background:#1a1814;color:#e2e0d8;padding:10px;border-radius:7px;overflow-x:auto;margin:7px 0;}
        .bubble.stay pre code{background:none;border:none;color:inherit;padding:0;}
        /* KaTeX */
        .bubble.stay .katex-display{overflow-x:auto;overflow-y:hidden;padding:6px 0;}
        .bubble.stay .katex{font-size:1em;}
        /* subject pill */
        .subj-pill{display:inline-block;font-size:9px;font-family:'Space Mono',monospace;font-weight:700;padding:2px 6px;border-radius:8px;margin-bottom:5px;letter-spacing:.4px;}
        .subj-pill.fisica{background:var(--accent-light);color:var(--accent);}
        .subj-pill.quimica{background:var(--amber-light);color:var(--amber);}
        .subj-pill.fisq{background:var(--green-light);color:var(--green);}
        /* typing */
        .typing-dots{display:flex;gap:4px;align-items:center;padding:3px 0;}
        .typing-dots span{width:5px;height:5px;background:var(--muted);border-radius:50%;animation:bounce 1.2s infinite;}
        .typing-dots span:nth-child(2){animation-delay:.2s;}
        .typing-dots span:nth-child(3){animation-delay:.4s;}
        @keyframes bounce{0%,80%,100%{transform:translateY(0);opacity:.4}40%{transform:translateY(-4px);opacity:1}}
        /* welcome */
        .welcome-bubble{background:var(--accent-light);border:1px solid #c7d4f8;border-radius:var(--radius);padding:14px 16px;max-width:520px;align-self:flex-start;}
        .welcome-bubble h3{font-family:'Space Mono',monospace;font-size:12px;font-weight:700;color:var(--accent);margin-bottom:5px;}
        .welcome-bubble p{font-size:13px;line-height:1.55;}
        .chip-row{display:flex;flex-wrap:wrap;gap:5px;margin-top:9px;}
        .chip{font-size:11px;padding:4px 9px;background:#fff;border:1px solid var(--border);border-radius:18px;cursor:pointer;color:var(--accent);font-weight:500;transition:all .15s;}
        .chip:hover{background:var(--accent);color:#fff;border-color:var(--accent);}

        /* ── PROMO BANNER ── */
        .promo-banner{background:linear-gradient(135deg,#1a3aa8 0%,#2a52d4 60%,#4f46e5 100%);border-radius:var(--radius);padding:18px 20px;color:#fff;max-width:520px;align-self:flex-start;box-shadow:var(--shadow-lg);}
        .promo-banner h3{font-family:'Space Mono',monospace;font-size:13px;font-weight:700;margin-bottom:6px;letter-spacing:.3px;}
        .promo-banner p{font-size:13px;line-height:1.6;opacity:.92;margin-bottom:12px;}
        .promo-banner .promo-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:14px;}
        .promo-banner .ptag{font-size:10px;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.3);border-radius:12px;padding:2px 8px;font-family:'Space Mono',monospace;}
        .promo-cta{display:flex;gap:8px;flex-wrap:wrap;}
        .promo-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;text-decoration:none;transition:all .15s;}
        .promo-btn.wa{background:#25d366;color:#fff;border:none;}
        .promo-btn.wa:hover{background:#1ebe5d;}
        .promo-btn.ig{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.4);}
        .promo-btn.ig:hover{background:rgba(255,255,255,.25);}

        /* ── FILE UPLOAD ── */
        #upload-area{display:none;padding:0 16px 8px;flex-shrink:0;}
        .upload-inner{max-width:760px;margin:0 auto;}
        .upload-box{border:1.5px dashed var(--border);border-radius:9px;padding:10px 14px;display:flex;align-items:center;gap:10px;background:var(--bg);cursor:pointer;transition:all .15s;font-size:13px;color:var(--muted);}
        .upload-box:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light);}
        .upload-box input{display:none;}
        #file-name-display{font-size:11px;color:var(--green);margin-top:4px;font-family:'Space Mono',monospace;}

        /* ── LOGIN SCREEN ── */
        #login-screen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:20px;overflow-y:auto;}
        .login-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px 28px;max-width:400px;width:100%;box-shadow:var(--shadow-lg);}
        .login-icon{width:48px;height:48px;background:var(--accent);border-radius:11px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-family:'Space Mono',monospace;font-weight:700;font-size:19px;color:#fff;}
        .login-card h2{text-align:center;font-size:19px;font-weight:600;margin-bottom:5px;}
        .login-card .sub{text-align:center;font-size:12px;color:var(--muted);line-height:1.6;margin-bottom:20px;}
        .login-divider{display:flex;align-items:center;gap:10px;margin:13px 0;color:var(--muted);font-size:11px;}
        .login-divider::before,.login-divider::after{content:'';flex:1;height:1px;background:var(--border);}
        .btn-google{width:100%;display:flex;align-items:center;justify-content:center;gap:9px;padding:10px;background:var(--surface);border:1.5px solid var(--border);border-radius:9px;font-size:13px;font-weight:600;color:var(--text);cursor:pointer;transition:all .15s;margin-bottom:8px;}
        .btn-google:hover{border-color:var(--accent);background:var(--accent-light);color:var(--accent);}
        .form-group{margin-bottom:10px;}
        .form-group label{display:block;font-size:11px;font-weight:600;margin-bottom:3px;color:var(--muted);letter-spacing:.3px;}
        .form-group input{width:100%;border:1.5px solid var(--border);border-radius:8px;padding:9px 11px;font-size:14px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .15s;background:var(--bg);}
        .form-group input:focus{border-color:var(--accent);background:#fff;}
        .btn-primary{width:100%;padding:10px;background:var(--accent);color:#fff;border:none;border-radius:9px;font-size:14px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:background .15s;margin-top:4px;}
        .btn-primary:hover{background:var(--accent-dark);}
        .btn-link{background:none;border:none;color:var(--accent);font-size:12px;cursor:pointer;padding:0;font-family:'DM Sans',sans-serif;text-decoration:underline;}
        #auth-error{font-size:11px;color:var(--red);text-align:center;min-height:14px;margin-top:6px;}
        .login-toggle{text-align:center;font-size:12px;color:var(--muted);margin-top:12px;}
        .login-footer{font-size:11px;color:var(--muted);text-align:center;max-width:300px;}

        /* ── INPUT AREA ── */
        #input-area{background:var(--surface);border-top:1px solid var(--border);padding:10px 14px;flex-shrink:0;}
        .input-row{display:flex;gap:7px;max-width:760px;margin:0 auto;align-items:flex-end;}
        #user-input{flex:1;border:1.5px solid var(--border);border-radius:10px;padding:9px 12px;font-size:14px;font-family:'DM Sans',sans-serif;color:var(--text);background:var(--bg);outline:none;resize:none;min-height:40px;max-height:110px;transition:border-color .15s;line-height:1.5;}
        #user-input:focus{border-color:var(--accent);background:#fff;}
        #user-input::placeholder{color:var(--muted);}
        #user-input:disabled{opacity:.5;cursor:not-allowed;}
        #send-btn{background:var(--accent);color:#fff;border:none;width:40px;height:40px;border-radius:9px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s;}
        #send-btn:hover{background:var(--accent-dark);}
        #send-btn:disabled{background:var(--border);cursor:not-allowed;}
        #upload-btn{background:var(--bg);border:1.5px solid var(--border);color:var(--muted);width:40px;height:40px;border-radius:9px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;}
        #upload-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light);}
        #upload-btn:disabled{opacity:.4;cursor:not-allowed;}
        #input-hint{font-size:10px;color:var(--muted);text-align:center;margin-top:5px;max-width:760px;margin-left:auto;margin-right:auto;}

        /* ── ADMIN ── */
        #admin-panel{flex:1;overflow-y:auto;padding:16px;display:none;flex-direction:column;gap:14px;}
        .admin-header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
        .admin-header h2{font-family:'Space Mono',monospace;font-size:15px;font-weight:700;}
        .admin-badge{font-size:10px;font-family:'Space Mono',monospace;background:var(--amber-light);color:var(--amber);border:1px solid var(--amber);padding:2px 7px;border-radius:18px;}
        .stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;}
        .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;box-shadow:var(--shadow);}
        .stat-card .label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;font-family:'Space Mono',monospace;margin-bottom:5px;}
        .stat-card .value{font-size:24px;font-weight:700;font-family:'Space Mono',monospace;color:var(--accent);}
        .stat-card .sub-val{font-size:10px;color:var(--muted);margin-top:2px;}
        .admin-section{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;box-shadow:var(--shadow);}
        .admin-section h3{font-size:12px;font-weight:600;font-family:'Space Mono',monospace;margin-bottom:10px;color:var(--accent);}
        .log-table{width:100%;border-collapse:collapse;font-size:11px;}
        .log-table th{text-align:left;padding:5px 8px;border-bottom:1px solid var(--border);color:var(--muted);font-weight:600;font-family:'Space Mono',monospace;font-size:10px;}
        .log-table td{padding:6px 8px;border-bottom:1px solid var(--border);vertical-align:top;}
        .log-table tr:last-child td{border-bottom:none;}
        .log-table tr:hover td{background:var(--bg);}
        .tag{display:inline-block;font-size:9px;padding:1px 5px;border-radius:7px;font-family:'Space Mono',monospace;}
        .tag.fisica{background:var(--accent-light);color:var(--accent);}
        .tag.quimica{background:var(--amber-light);color:var(--amber);}
        .tag.fisq{background:var(--green-light);color:var(--green);}
        .admin-refresh{background:var(--bg);border:1px solid var(--border);padding:5px 12px;border-radius:7px;font-size:11px;cursor:pointer;font-family:'Space Mono',monospace;transition:all .15s;}
        .admin-refresh:hover{border-color:var(--accent);color:var(--accent);}
        .bar-wrap{background:var(--bg);border-radius:5px;height:7px;overflow:hidden;}
        .bar-fill{height:100%;border-radius:5px;background:var(--accent);transition:width .4s ease;}

        /* ── RESPONSIVE ── */
        @media(max-width:480px){
            header{padding:0 12px;height:50px;}
            .logo-sub{display:none;}
            .uname{display:none;}
            #quota-badge{display:none;}
            #subject-bar{padding:7px 10px;gap:4px;}
            .subj-btn{font-size:10px;padding:4px 10px;}
            #chat-box{padding:12px 10px;gap:10px;}
            .bubble{font-size:13px;padding:9px 11px;}
            .msg-avatar{display:none;}
            .msg-row.user{max-width:95%;}
            .msg-row.stay{max-width:100%;}
            #input-area{padding:8px 10px;}
            #user-input{font-size:14px;padding:8px 10px;}
            #input-hint{display:none;}
            .login-card{padding:22px 18px;}
            .stats-grid{grid-template-columns:1fr 1fr;}
            .promo-banner{padding:14px 15px;}
            .promo-cta{flex-direction:column;}
        }
        @media(min-width:481px) and (max-width:768px){
            .msg-row.user{max-width:88%;}
            .msg-row.stay{max-width:96%;}
        }
    </style>
</head>
<body>
<header>
    <div class="logo">
        <div class="logo-badge">E</div>
        <div>
            <div class="logo-text">EUREKA</div>
            <div class="logo-sub">Tutor · Física &amp; Química</div>
        </div>
    </div>
    <div id="auth-area"></div>
</header>

<div id="subject-bar" style="display:none">
    <button class="subj-btn active" data-subj="fisica">⚛ Física</button>
    <button class="subj-btn" data-subj="quimica">⚗ Química</button>
    <button class="subj-btn" data-subj="fisq">🔬 Fisicoquímica</button>
    <button class="subj-btn" data-subj="carbono">🧬 Q. Carbono</button>
    <button class="subj-btn" data-subj="ingreso">📐 Ingreso</button>
</div>

<!-- LOGIN -->
<div id="login-screen">
    <div class="login-card">
        <div class="login-icon">E</div>
        <h2>Bienvenido a EUREKA</h2>
        <p class="sub">Tu tutor de Física y Química. Registrate gratis o ingresá con Google.</p>
        <button class="btn-google" id="login-google-btn">
            <svg viewBox="0 0 24 24" width="17" height="17"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>

function todayStr(){return new Date().toISOString().slice(0,10);}

async function getUserData(uid){
    const doc=await db.collection('users').doc(uid).get();
    if(!doc.exists)return{queriesUsed:0,uploadsUsed:0,quotaDate:''};
    const d=doc.data();
    if(d.quotaDate!==todayStr())return{queriesUsed:0,uploadsUsed:0,quotaDate:todayStr()};
    return{queriesUsed:d.queriesUsed||0,uploadsUsed:d.uploadsUsed||0,quotaDate:d.quotaDate};
}

async function incrementQuota(uid,field){
    const ref=db.collection('users').doc(uid);
    const doc=await ref.get();
    const today=todayStr();
    if(!doc.exists||doc.data().quotaDate!==today){
        const data={quotaDate:today,queriesUsed:0,uploadsUsed:0};
        data[field]=1;
        await ref.set(data,{merge:true});
    }else{
        await ref.update({[field]:firebase.firestore.FieldValue.increment(1)});
    }
}

async function updateQuotaBadge(uid){
    const d=await getUserData(uid);
    const remQ=Math.max(0,MAX_QUERIES-d.queriesUsed);
    const remU=Math.max(0,MAX_UPLOADS-d.uploadsUsed);
    const badge=document.getElementById('quota-badge');
    if(!badge)return{remQ,remU};
    badge.textContent=`${remQ}✉ ${remU}📎`;
    badge.className='';
    if(remQ===0&&remU===0)badge.classList.add('danger');
    else if(remQ<=1)badge.classList.add('warning');
    return{remQ,remU};
}

}

async function sendToGroq(user,text,subj,isUpload){
    showTyping();
    try{
        const res=await fetch(WORKER_URL,{
            method:"POST",headers:{"Content-Type":"application/json"},
            body:JSON.stringify({question:text,system:SUBJ_PROMPTS[subj]})
        });

        // Si el worker devuelve error JSON (no stream)
        const contentType=res.headers.get('content-type')||'';
        if(!res.ok||contentType.includes('application/json')){
            const data=await res.json();
            removeTyping();
            addMessage('⚠️ Error de IA: '+(data.error?.message||'Error desconocido'),false,subj);
            return;
        }

        removeTyping();

        // Crear burbuja de respuesta vacía para ir llenando
        const box=document.getElementById('chat-box');
        const row=document.createElement('div');
        row.className='msg-row stay';
        const av=document.createElement('div');
        av.className='msg-avatar stay-av';av.textContent='ST';
        const bubble=document.createElement('div');
        bubble.className='bubble stay';
        const pill=document.createElement('div');
        pill.className='subj-pill '+subj;
        pill.textContent=(SUBJ_LABELS[subj]||subj).toUpperCase();
        bubble.appendChild(pill);
        const content=document.createElement('div');
        content.className='stream-content';
        bubble.appendChild(content);
        row.appendChild(av);row.appendChild(bubble);
        box.appendChild(row);
        box.scrollTop=box.scrollHeight;

        // Leer stream SSE
        const reader=res.body.getReader();
        const decoder=new TextDecoder();
        let fullText='';
        let buffer='';

        while(true){
            const{done,value}=await reader.read();
            if(done)break;
            buffer+=decoder.decode(value,{stream:true});
            const lines=buffer.split('\n');
            buffer=lines.pop(); // guardar línea incompleta

            for(const line of lines){
                if(!line.startsWith('data: '))continue;
                const data=line.slice(6).trim();
                if(data==='[DONE]')break;
                try{
                    const parsed=JSON.parse(data);
                    const delta=parsed.choices?.[0]?.delta?.content||'';
                    if(delta){
                        fullText+=delta;
                        // Render markdown parcial — solo texto plano durante stream
                        content.innerHTML=marked.parse(fullText);
                        box.scrollTop=box.scrollHeight;
                    }
                }catch(e){/* chunk incompleto, ignorar */}
            }
        }

        // Render final con KaTeX
        renderLatex(bubble);
        box.scrollTop=box.scrollHeight;

        // Estimar tokens (aprox 4 chars = 1 token)
        const tokens=Math.round((text.length+fullText.length)/4);
        logQuery(user,text,subj,tokens,isUpload).catch(console.error);

        // Mostrar promo si se agotaron los límites
        const d2=await getUserData(user.uid);
        if(d2.queriesUsed>=MAX_QUERIES&&d2.uploadsUsed>=MAX_UPLOADS)showPromoBanner();

    }catch(e){
        removeTyping();
        addMessage('⚠️ Error de conexión: '+e.message,false,subj);
    }
}

document.getElementById('send-btn').onclick=handleSend;
document.getElementById('user-input').addEventListener('keydown',e=>{
    if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();handleSend();}
});

// ── ADMIN PANEL ───────────────────────────────────────────────────────────────
async function showAdminPanel(){
    document.getElementById('chat-box').style.display='none';
    document.getElementById('input-area').style.display='none';
    document.getElementById('upload-area').style.display='none';
    const panel=document.getElementById('admin-panel');
    panel.style.display='flex';panel.style.flexDirection='column';
    panel.innerHTML=`<div style="text-align:center;padding:40px;color:var(--muted);font-family:'Space Mono',monospace;font-size:12px;">Cargando…</div>`;
    await loadAdminData(panel);
}

async function loadAdminData(panel){
    try{
        const snap=await db.collection('queries').orderBy('timestamp','desc').limit(200).get();
        const queries=snap.docs.map(d=>d.data());
        const today=todayStr();
        const todayQ=queries.filter(q=>q.timestamp?.toDate()?.toISOString().slice(0,10)===today);
        const totalTok=queries.reduce((a,q)=>a+(q.tokens||0),0);
        const todayTok=todayQ.reduce((a,q)=>a+(q.tokens||0),0);
        const uids=[...new Set(queries.map(q=>q.uid))];
        const bySubj={};
        Object.keys(SUBJ_LABELS).forEach(s=>bySubj[s]=0);
        queries.forEach(q=>{if(bySubj[q.subject]!==undefined)bySubj[q.subject]++;});
        const userMap={};
        queries.forEach(q=>{
            if(!userMap[q.uid])userMap[q.uid]={email:q.email,name:q.name,count:0,tokens:0};
            userMap[q.uid].count++;userMap[q.uid].tokens+=(q.tokens||0);
        });
        const topUsers=Object.values(userMap).sort((a,b)=>b.count-a.count).slice(0,10);
        const maxSubj=Math.max(...Object.values(bySubj),1);

        panel.innerHTML=`
        <div class="admin-header">
            <div style="display:flex;align-items:center;gap:9px;">
                <h2>Panel Admin</h2><span class="admin-badge">ADMIN</span>
            </div>
            <button class="admin-refresh" onclick="showAdminPanel()">↻ Actualizar</button>
        </div>
        <div class="stats-grid">
            <div class="stat-card"><div class="label">Consultas hoy</div><div class="value">${todayQ.length}</div><div class="sub-val">${queries.length} total (últ.200)</div></div>
            <div class="stat-card"><div class="label">Tokens hoy</div><div class="value">${todayTok.toLocaleString()}</div><div class="sub-val">${totalTok.toLocaleString()} total</div></div>
            <div class="stat-card"><div class="label">Usuarios únicos</div><div class="value">${uids.length}</div><div class="sub-val">en últ. 200 consultas</div></div>
            <div class="stat-card"><div class="label">Tokens/consulta</div><div class="value">${queries.length?Math.round(totalTok/queries.length):0}</div><div class="sub-val">promedio</div></div>
        </div>
        <div class="admin-section"><h3>Uso por materia</h3>
            ${Object.entries(bySubj).map(([s,n])=>`
            <div style="margin-bottom:9px;">
                <div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px;">
                    <span class="tag ${s}">${SUBJ_LABELS[s]||s}</span>
                    <span style="font-family:'Space Mono',monospace;">${n}</span>
                </div>
                <div class="bar-wrap"><div class="bar-fill" style="width:${Math.round(n/maxSubj*100)}%"></div></div>
            </div>`).join('')}
        </div>
        <div class="admin-section"><h3>Top usuarios</h3>
            <table class="log-table">
                <thead><tr><th>Nombre</th><th>Email</th><th>Consultas</th><th>Tokens</th></tr></thead>
                <tbody>${topUsers.map(u=>`<tr>
                    <td>${u.name||'—'}</td><td style="color:var(--muted)">${u.email}</td>
                    <td style="font-family:'Space Mono',monospace">${u.count}</td>
                    <td style="font-family:'Space Mono',monospace">${(u.tokens||0).toLocaleString()}</td>
                </tr>`).join('')}</tbody>
            </table>
        </div>
        <div class="admin-section"><h3>Últimas 50 consultas</h3>
            <table class="log-table">
                <thead><tr><th>Hora</th><th>Usuario</th><th>Materia</th><th>Consulta</th><th>Tok</th></tr></thead>
                <tbody>${queries.slice(0,50).map(q=>{
                    const ts=q.timestamp?.toDate();
                    const hora=ts?ts.toLocaleString('es-AR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}):'—';
                    return`<tr>
                        <td style="white-space:nowrap;font-family:'Space Mono',monospace;font-size:10px">${hora}</td>
                        <td style="color:var(--muted);font-size:10px">${q.name||q.email||'—'}</td>
                        <td><span class="tag ${q.subject||''}">${SUBJ_LABELS[q.subject]||q.subject||'—'}</span>${q.isUpload?'<span style="font-size:9px;margin-left:3px">📎</span>':''}</td>
                        <td style="max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escapeHtml(q.question||'')}</td>
                        <td style="font-family:'Space Mono',monospace;font-size:10px">${q.tokens||0}</td>
                    </tr>`;
                }).join('')}</tbody>
            </table>
        </div>
        <div style="padding-bottom:20px;text-align:center;">
            <button class="btn-link" onclick="showChatFromAdmin()">← Volver al chat</button>
        </div>`;
    }catch(e){
        panel.innerHTML=`<div style="padding:40px;text-align:center;color:var(--red)">Error: ${e.message}</div>`;
    }
}

function showChatFromAdmin(){
    document.getElementById('admin-panel').style.display='none';
    document.getElementById('chat-box').style.display='flex';
    document.getElementById('input-area').style.display='block';
    document.getElementById('upload-area').style.display='block';
}
