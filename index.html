<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EUREKA · Tutor IA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        :root {
            --bg:#f7f6f2; --surface:#fff; --border:#e2e0d8; --text:#1a1814; --muted:#8a8680;
            --accent:#2a52d4; --accent-light:#eef1fc; --accent-dark:#1a3aa8;
            --amber:#b45309; --amber-light:#fef3e2;
            --red:#dc2626; --red-light:#fef2f2;
            --green:#15803d; --green-light:#f0fdf4;
            --shadow:0 1px 3px rgba(0,0,0,.08),0 4px 12px rgba(0,0,0,.04);
            --shadow-lg:0 4px 16px rgba(0,0,0,.10),0 1px 4px rgba(0,0,0,.06);
        }
        *{box-sizing:border-box;margin:0;padding:0;}
        body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);height:100dvh;display:flex;flex-direction:column;overflow:hidden;}

        /* HEADER */
        header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;height:58px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;box-shadow:var(--shadow);z-index:100;}
        .logo{display:flex;align-items:center;gap:10px;}
        .logo-badge{width:34px;height:34px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-weight:700;color:#fff;font-size:15px;}
        .logo-text{font-family:'Space Mono',monospace;font-weight:700;font-size:17px;letter-spacing:-.5px;}
        .logo-sub{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;}
        #auth-area{display:flex;align-items:center;gap:10px;position:relative;}

        /* QUOTA BADGE */
        #quota-badge{font-size:11px;font-family:'Space Mono',monospace;color:var(--muted);background:var(--bg);border:1px solid var(--border);padding:3px 8px;border-radius:20px;}
        #quota-badge.warning{color:var(--amber);border-color:var(--amber);background:var(--amber-light);}
        #quota-badge.danger{color:var(--red);border-color:var(--red);background:var(--red-light);}

        /* USER DROPDOWN */
        .user-menu-wrap{position:relative;}
        .user-trigger{display:flex;align-items:center;gap:8px;background:var(--bg);border:1px solid var(--border);border-radius:24px;padding:4px 10px 4px 4px;cursor:pointer;transition:border-color .15s;}
        .user-trigger:hover{border-color:var(--accent);}
        .user-trigger img{width:26px;height:26px;border-radius:50%;object-fit:cover;}
        .user-trigger span{font-size:13px;font-weight:500;}
        .user-trigger .chevron{font-size:10px;color:var(--muted);transition:transform .2s;}
        .user-trigger.open .chevron{transform:rotate(180deg);}
        .user-dropdown{position:absolute;top:calc(100% + 8px);right:0;background:var(--surface);border:1px solid var(--border);border-radius:12px;box-shadow:var(--shadow-lg);min-width:220px;overflow:hidden;display:none;z-index:200;}
        .user-dropdown.open{display:block;animation:fadeDown .15s ease;}
        @keyframes fadeDown{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
        .dd-header{padding:12px 14px;border-bottom:1px solid var(--border);background:var(--bg);}
        .dd-name{font-size:13px;font-weight:600;}
        .dd-email{font-size:11px;color:var(--muted);margin-top:2px;word-break:break-all;}
        .dd-item{display:flex;align-items:center;gap:10px;padding:10px 14px;font-size:13px;cursor:pointer;transition:background .12s;border:none;background:none;width:100%;text-align:left;color:var(--text);}
        .dd-item:hover{background:var(--bg);}
        .dd-item.danger{color:var(--red);}
        .dd-item.danger:hover{background:var(--red-light);}
        .dd-sep{height:1px;background:var(--border);}

        /* LOGIN BTN */
        .btn-login{background:var(--accent);color:#fff;border:none;padding:8px 18px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;display:flex;align-items:center;gap:8px;transition:background .15s,transform .1s;}
        .btn-login:hover{background:var(--accent-dark);transform:translateY(-1px);}

        /* SUBJECT BAR */
        #subject-bar{display:flex;gap:6px;padding:10px 20px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;}
        .subj-btn{font-size:12px;font-weight:600;padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:var(--bg);color:var(--muted);cursor:pointer;font-family:'Space Mono',monospace;transition:all .15s;}
        .subj-btn:hover{color:var(--accent);border-color:var(--accent);background:var(--accent-light);}
        .subj-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);}

        /* CHAT */
        #chat-box{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:14px;scroll-behavior:smooth;}
        #chat-box::-webkit-scrollbar{width:4px;}
        #chat-box::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
        .msg-row{display:flex;gap:10px;max-width:780px;width:100%;}
        .msg-row.user{align-self:flex-end;flex-direction:row-reverse;}
        .msg-row.stay{align-self:flex-start;}
        .msg-avatar{width:30px;height:30px;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-size:11px;font-weight:700;}
        .msg-avatar.stay-av{background:var(--accent);color:#fff;}
        .msg-avatar.user-av{background:var(--text);color:#fff;}
        .bubble{padding:11px 15px;border-radius:12px;font-size:14px;line-height:1.65;max-width:calc(100% - 44px);box-shadow:var(--shadow);}
        .bubble.stay{background:var(--surface);border:1px solid var(--border);border-top-left-radius:3px;}
        .bubble.user{background:var(--accent);color:#fff;border-top-right-radius:3px;}
        .bubble.stay strong{color:var(--accent);font-weight:600;}
        .bubble.stay em{color:var(--amber);font-style:italic;}
        .bubble.stay p{margin-bottom:8px;}.bubble.stay p:last-child{margin-bottom:0;}
        .bubble.stay ul,.bubble.stay ol{padding-left:18px;margin-bottom:8px;}
        .bubble.stay li{margin-bottom:4px;}
        .bubble.stay code{font-family:'Space Mono',monospace;font-size:12px;background:var(--bg);padding:2px 5px;border-radius:4px;border:1px solid var(--border);}
        .bubble.stay pre{background:var(--text);color:#e2e0d8;padding:12px;border-radius:8px;overflow-x:auto;margin:8px 0;}
        .bubble.stay pre code{background:none;border:none;color:inherit;padding:0;}
        .subj-pill{display:inline-block;font-size:10px;font-family:'Space Mono',monospace;font-weight:700;padding:2px 7px;border-radius:10px;margin-bottom:6px;letter-spacing:.5px;}
        .subj-pill.fisica{background:var(--accent-light);color:var(--accent);}
        .subj-pill.quimica{background:var(--amber-light);color:var(--amber);}
        .subj-pill.fisq{background:var(--green-light);color:var(--green);}
        .typing-dots{display:flex;gap:4px;align-items:center;padding:4px 2px;}
        .typing-dots span{width:6px;height:6px;background:var(--muted);border-radius:50%;animation:bounce 1.2s infinite;}
        .typing-dots span:nth-child(2){animation-delay:.2s;}
        .typing-dots span:nth-child(3){animation-delay:.4s;}
        @keyframes bounce{0%,80%,100%{transform:translateY(0);opacity:.4}40%{transform:translateY(-5px);opacity:1}}
        .welcome-bubble{background:var(--accent-light);border:1px solid #c7d4f8;border-radius:12px;padding:16px 20px;max-width:520px;align-self:flex-start;}
        .welcome-bubble h3{font-family:'Space Mono',monospace;font-size:13px;font-weight:700;color:var(--accent);margin-bottom:6px;}
        .welcome-bubble p{font-size:13px;line-height:1.6;}
        .chip-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;}
        .chip{font-size:12px;padding:4px 10px;background:#fff;border:1px solid var(--border);border-radius:20px;cursor:pointer;color:var(--accent);font-weight:500;transition:all .15s;}
        .chip:hover{background:var(--accent);color:#fff;border-color:var(--accent);}

        /* LOGIN SCREEN */
        #login-screen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:32px;}
        .login-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:36px 40px;max-width:420px;width:100%;box-shadow:var(--shadow-lg);}
        .login-icon{width:52px;height:52px;background:var(--accent);border-radius:12px;display:flex;align-items:center;justify-content:center;margin:0 auto 18px;font-family:'Space Mono',monospace;font-weight:700;font-size:20px;color:#fff;}
        .login-card h2{text-align:center;font-size:21px;font-weight:600;margin-bottom:6px;}
        .login-card .sub{text-align:center;font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:24px;}
        .login-divider{display:flex;align-items:center;gap:10px;margin:16px 0;color:var(--muted);font-size:12px;}
        .login-divider::before,.login-divider::after{content:'';flex:1;height:1px;background:var(--border);}
        .btn-google{width:100%;display:flex;align-items:center;justify-content:center;gap:10px;padding:11px;background:var(--surface);border:1.5px solid var(--border);border-radius:10px;font-size:14px;font-weight:600;color:var(--text);cursor:pointer;transition:all .15s;margin-bottom:10px;}
        .btn-google:hover{border-color:var(--accent);background:var(--accent-light);color:var(--accent);}
        .form-group{margin-bottom:12px;}
        .form-group label{display:block;font-size:12px;font-weight:600;margin-bottom:4px;color:var(--muted);}
        .form-group input{width:100%;border:1.5px solid var(--border);border-radius:8px;padding:9px 12px;font-size:14px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .15s;}
        .form-group input:focus{border-color:var(--accent);}
        .btn-primary{width:100%;padding:11px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:background .15s;}
        .btn-primary:hover{background:var(--accent-dark);}
        .btn-link{background:none;border:none;color:var(--accent);font-size:12px;cursor:pointer;padding:0;font-family:'DM Sans',sans-serif;text-decoration:underline;}
        #auth-error{font-size:12px;color:var(--red);text-align:center;min-height:16px;margin-top:8px;}
        .login-toggle{text-align:center;font-size:12px;color:var(--muted);margin-top:14px;}
        .login-footer{font-size:11px;color:var(--muted);text-align:center;max-width:320px;}

        /* INPUT AREA */
        #input-area{background:var(--surface);border-top:1px solid var(--border);padding:12px 20px;flex-shrink:0;}
        .input-row{display:flex;gap:8px;max-width:780px;margin:0 auto;align-items:flex-end;}
        #user-input{flex:1;border:1.5px solid var(--border);border-radius:10px;padding:10px 14px;font-size:14px;font-family:'DM Sans',sans-serif;color:var(--text);background:var(--bg);outline:none;resize:none;min-height:42px;max-height:120px;transition:border-color .15s;line-height:1.5;}
        #user-input:focus{border-color:var(--accent);background:#fff;}
        #user-input::placeholder{color:var(--muted);}
        #send-btn{background:var(--accent);color:#fff;border:none;width:42px;height:42px;border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s,transform .1s;}
        #send-btn:hover{background:var(--accent-dark);transform:translateY(-1px);}
        #send-btn:disabled{background:var(--border);cursor:not-allowed;transform:none;}
        #input-hint{font-size:11px;color:var(--muted);text-align:center;margin-top:6px;max-width:780px;margin-left:auto;margin-right:auto;}

        /* ADMIN PANEL */
        #admin-panel{flex:1;overflow-y:auto;padding:20px;display:none;flex-direction:column;gap:16px;}
        .admin-header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
        .admin-header h2{font-family:'Space Mono',monospace;font-size:16px;font-weight:700;}
        .admin-badge{font-size:10px;font-family:'Space Mono',monospace;background:var(--amber-light);color:var(--amber);border:1px solid var(--amber);padding:2px 8px;border-radius:20px;}
        .stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;}
        .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;box-shadow:var(--shadow);}
        .stat-card .label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;font-family:'Space Mono',monospace;margin-bottom:6px;}
        .stat-card .value{font-size:26px;font-weight:700;font-family:'Space Mono',monospace;color:var(--accent);}
        .stat-card .sub-val{font-size:11px;color:var(--muted);margin-top:2px;}
        .admin-section{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;box-shadow:var(--shadow);}
        .admin-section h3{font-size:13px;font-weight:600;font-family:'Space Mono',monospace;margin-bottom:12px;color:var(--accent);}
        .log-table{width:100%;border-collapse:collapse;font-size:12px;}
        .log-table th{text-align:left;padding:6px 10px;border-bottom:1px solid var(--border);color:var(--muted);font-weight:600;font-family:'Space Mono',monospace;font-size:11px;}
        .log-table td{padding:7px 10px;border-bottom:1px solid var(--border);vertical-align:top;}
        .log-table tr:last-child td{border-bottom:none;}
        .log-table tr:hover td{background:var(--bg);}
        .tag{display:inline-block;font-size:10px;padding:1px 6px;border-radius:8px;font-family:'Space Mono',monospace;}
        .tag.fisica{background:var(--accent-light);color:var(--accent);}
        .tag.quimica{background:var(--amber-light);color:var(--amber);}
        .tag.fisq{background:var(--green-light);color:var(--green);}
        .admin-refresh{background:var(--bg);border:1px solid var(--border);padding:6px 14px;border-radius:8px;font-size:12px;cursor:pointer;font-family:'Space Mono',monospace;transition:all .15s;}
        .admin-refresh:hover{border-color:var(--accent);color:var(--accent);}
        .bar-wrap{background:var(--bg);border-radius:6px;height:8px;overflow:hidden;}
        .bar-fill{height:100%;border-radius:6px;background:var(--accent);transition:width .4s ease;}

        @media(max-width:600px){
            header{padding:0 12px;}
            #subject-bar{padding:8px 12px;}
            #chat-box{padding:12px;}
            #input-area{padding:10px 12px;}
            .login-card{padding:24px 18px;}
            .stats-grid{grid-template-columns:1fr 1fr;}
        }
    </style>
</head>
<body>
<header>
    <div class="logo">
        <div class="logo-badge">E</div>
        <div>
            <div class="logo-text">EUREKA</div>
            <div class="logo-sub">Tutor · Física &amp; Química</div>
        </div>
    </div>
    <div id="auth-area"></div>
</header>

<div id="subject-bar" style="display:none">
    <button class="subj-btn active" data-subj="fisica">⚛ Física</button>
    <button class="subj-btn" data-subj="quimica">⚗ Química</button>
    <button class="subj-btn" data-subj="fisq">🔬 Fisicoquímica</button>
</div>

<!-- LOGIN -->
<div id="login-screen">
    <div class="login-card">
        <div class="login-icon">E</div>
        <h2>Bienvenido a EUREKA</h2>
        <p class="sub">Tu tutor de Física y Química. Registrate gratis o ingresá con tu cuenta Google.</p>
        <button class="btn-google" id="login-google-btn">
            <svg viewBox="0 0 24 24" width="18" height="18"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
            Continuar con Google
        </button>
        <div class="login-divider">o con email</div>
        <!-- EMAIL FORM -->
        <div id="email-form">
            <div class="form-group">
                <label>EMAIL</label>
                <input type="email" id="inp-email" placeholder="tu@email.com" autocomplete="email">
            </div>
            <div class="form-group">
                <label>CONTRASEÑA</label>
                <input type="password" id="inp-pass" placeholder="••••••••" autocomplete="current-password">

            <div id="register-fields" style="display:none">

            <button class="btn-primary" id="email-action-btn">Ingresar</button>
            <div class="login-toggle">
                <span id="toggle-text">¿No tenés cuenta?</span>
                <button class="btn-link" id="toggle-mode-btn">Registrate</button>
            </div>
        </div>
    </div>
    <p class="login-footer">Acceso gratuito · Sin publicidad · 10 consultas por día</p>
</div>

<!-- CHAT -->
<div id="chat-box" style="display:none"></div>

<!-- ADMIN PANEL -->
<div id="admin-panel"></div>

<!-- INPUT -->
<div id="input-area" style="display:none">
    <div class="input-row">
        <textarea id="user-input" placeholder="Escribí tu consulta…" rows="1"></textarea>
        <button id="send-btn" title="Enviar">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
    </div>
    <div id="input-hint">Enter para enviar · Shift+Enter nueva línea</div>
</div>

<script>
// ── CONSTANTES ────────────────────────────────────────────────────────────────
const WORKER_URL  = "https://eureka-proxy.fisicai-eureka-01.workers.dev";
const MAX_DAILY   = 10;
const ADMIN_EMAIL = "fisicai.eureka.01@gmail.com";
const SUBJ_LABELS = {fisica:'Física', quimica:'Química', fisq:'Fisicoquímica'};
const SUBJ_PROMPTS = {
    fisica:  'Sos STAY, tutor experto en Física. Respondé paso a paso en español, explicá conceptos antes de resolver. Sé conciso pero completo. Usá negritas para términos clave.',
    quimica: 'Sos STAY, tutor experto en Química. Respondé paso a paso en español. Balanceá ecuaciones si corresponde, usá nomenclatura IUPAC. Sé conciso.',
    fisq:    'Sos STAY, tutor experto en Fisicoquímica. Respondé paso a paso en español. Integrá física y química, incluí unidades y fundamentos termodinámicos cuando corresponda.'
};

// ── FIREBASE ──────────────────────────────────────────────────────────────────
firebase.initializeApp({
    apiKey:"AIzaSyCGTT2IwpD_L415hHW26UsCAp5PdjfEDqg",
    authDomain:"eureka-tutor.firebaseapp.com",
    projectId:"eureka-tutor",
    storageBucket:"eureka-tutor.firebasestorage.app",
    messagingSenderId:"305479110536",
    appId:"1:305479110536:web:6d4783301d188d1b30743d"
});
const auth = firebase.auth();
const db   = firebase.firestore();
const googleProvider = new firebase.auth.GoogleAuthProvider();

// ── SUBJECT ───────────────────────────────────────────────────────────────────
let currentSubject = 'fisica';
document.querySelectorAll('.subj-btn').forEach(btn => {
    btn.onclick = () => {
        document.querySelectorAll('.subj-btn').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
        currentSubject = btn.dataset.subj;
    };
});

// ── LOGIN MODE (email/register toggle) ────────────────────────────────────────
let isRegisterMode = false;
document.getElementById('toggle-mode-btn').onclick = () => {
    isRegisterMode = !isRegisterMode;
    document.getElementById('register-fields').style.display = isRegisterMode ? 'block' : 'none';
    document.getElementById('email-action-btn').textContent  = isRegisterMode ? 'Crear cuenta' : 'Ingresar';
    document.getElementById('toggle-text').textContent       = isRegisterMode ? '¿Ya tenés cuenta?' : '¿No tenés cuenta?';
    document.getElementById('toggle-mode-btn').textContent   = isRegisterMode ? 'Iniciá sesión' : 'Registrate';
    document.getElementById('auth-error').textContent = '';
};

function setAuthError(msg){ document.getElementById('auth-error').textContent = msg; }

document.getElementById('login-google-btn').onclick = () =>
    auth.signInWithPopup(googleProvider).catch(e => setAuthError(e.message));

document.getElementById('email-action-btn').onclick = async () => {
    const email = document.getElementById('inp-email').value.trim();
    const pass  = document.getElementById('inp-pass').value;
    const name  = document.getElementById('inp-name').value.trim();
    setAuthError('');
    if (!email || !pass) return setAuthError('Completá email y contraseña.');
    try {
        if (isRegisterMode) {
            const cred = await auth.createUserWithEmailAndPassword(email, pass);
            if (name) await cred.user.updateProfile({ displayName: name });
        } else {
            await auth.signInWithEmailAndPassword(email, pass);
        }
    } catch(e) {
        const msgs = {
            'auth/email-already-in-use':'El email ya está registrado.',
            'auth/invalid-email':'Email inválido.',
            'auth/weak-password':'Contraseña muy corta (mínimo 6 caracteres).',
            'auth/user-not-found':'Usuario no encontrado.',
            'auth/wrong-password':'Contraseña incorrecta.'
        };
        setAuthError(msgs[e.code] || e.message);
    }
};

// Enter en inputs del form
['inp-email','inp-pass','inp-name'].forEach(id => {
    document.getElementById(id).addEventListener('keydown', e => {
        if (e.key === 'Enter') document.getElementById('email-action-btn').click();

// ── AUTH STATE ────────────────────────────────────────────────────────────────
auth.onAuthStateChanged(user => {

    else      showLoginScreen();

function showLoginScreen() {
    document.getElementById('login-screen').style.display  = 'flex';
    document.getElementById('chat-box').style.display      = 'none';
    document.getElementById('admin-panel').style.display   = 'none';
    document.getElementById('input-area').style.display    = 'none';
    document.getElementById('subject-bar').style.display   = 'none';
    document.getElementById('auth-area').innerHTML = '';
}

async function showApp(user) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('subject-bar').style.display  = 'flex';

    const isAdmin = user.email === ADMIN_EMAIL;

    // Auth area con dropdown
    const firstName = (user.displayName || user.email.split('@')[0]).split(' ')[0];
    document.getElementById('auth-area').innerHTML = `
        <span id="quota-badge"></span>
        <div class="user-menu-wrap">
            <div class="user-trigger" id="user-trigger">
                <img src="${user.photoURL || 'https://ui-avatars.com/api/?name='+encodeURIComponent(firstName)+'&background=2a52d4&color=fff&size=64'}" alt="avatar">
                <span>${firstName}</span>
                <span class="chevron">▾</span>
            </div>
            <div class="user-dropdown" id="user-dropdown">
                <div class="dd-header">
                    <div class="dd-name">${user.displayName || firstName}</div>
                    <div class="dd-email">${user.email}</div>
                </div>
                ${isAdmin ? `<button class="dd-item" id="dd-admin-btn">⚙ Panel Admin</button><div class="dd-sep"></div>` : ''}
                <button class="dd-item danger" id="dd-logout-btn">↩ Cerrar sesión</button>
            </div>
        </div>`;

    // Dropdown toggle
    document.getElementById('user-trigger').onclick = (e) => {
        e.stopPropagation();
        const dd = document.getElementById('user-dropdown');
        const tr = document.getElementById('user-trigger');
        dd.classList.toggle('open');
        tr.classList.toggle('open');
    };

        document.getElementById('user-dropdown')?.classList.remove('open');
        document.getElementById('user-trigger')?.classList.remove('open');

    if (isAdmin) {
        document.getElementById('dd-admin-btn').onclick = () => {
            document.getElementById('user-dropdown').classList.remove('open');

    await updateQuotaBadge(user.uid);

    // Show chat
    showChat(user, firstName, isAdmin);
}

// ── QUOTA (Firestore) ─────────────────────────────────────────────────────────
function todayStr() { return new Date().toISOString().slice(0,10); }

async function getUsedToday(uid) {
    const doc = await db.collection('users').doc(uid).get();
    if (!doc.exists) return 0;
    const data = doc.data();
    if (data.quotaDate !== todayStr()) return 0;
    return data.quotaUsed || 0;
}

async function incrementQuota(uid) {
    const ref  = db.collection('users').doc(uid);
    const doc  = await ref.get();
    const today = todayStr();
    if (!doc.exists || doc.data().quotaDate !== today) {
        await ref.set({ quotaDate: today, quotaUsed: 1 }, { merge: true });
    } else {
        await ref.update({ quotaUsed: firebase.firestore.FieldValue.increment(1) });
    }
}

async function updateQuotaBadge(uid) {
    const used = await getUsedToday(uid);
    const rem  = Math.max(0, MAX_DAILY - used);
    const badge = document.getElementById('quota-badge');
    if (!badge) return rem;
    badge.textContent = rem + '/' + MAX_DAILY + ' hoy';
    badge.className   = '';
    if (rem === 0)  badge.classList.add('danger');
    else if (rem <= 3) badge.classList.add('warning');
    return rem;
}

// ── LOG QUERY (Firestore) ─────────────────────────────────────────────────────
async function logQuery(user, question, subject, tokensUsed) {
    await db.collection('queries').add({
        uid:       user.uid,
        email:     user.email,
        name:      user.displayName || '',
        question:  question.slice(0, 300),
        subject:   subject,
        tokens:    tokensUsed || 0,
        timestamp: firebase.firestore.FieldValue.serverTimestamp()
    });
}

// ── CHAT ──────────────────────────────────────────────────────────────────────
function showChat(user, firstName, isAdmin) {
    const chatBox = document.getElementById('chat-box');
    chatBox.style.display   = 'flex';
    chatBox.style.flexDirection = 'column';
    document.getElementById('admin-panel').style.display = 'none';
    document.getElementById('input-area').style.display  = 'block';

    if (chatBox.children.length === 0) {
        const welcome = document.createElement('div');
        welcome.className = 'welcome-bubble';
        welcome.innerHTML = `
            <h3>STAY · Sistema de Apoyo y Tutoría</h3>
            <p>Hola <strong>${firstName}</strong>, estoy listo para ayudarte con Física, Química y Fisicoquímica. Elegí la materia arriba y hacé tu consulta.</p>
            <div class="chip-row">
                <span class="chip" onclick="setInput(this)">¿Qué es la segunda ley de Newton?</span>
                <span class="chip" onclick="setInput(this)">Balancear: H₂ + O₂ → H₂O</span>
                <span class="chip" onclick="setInput(this)">Gas ideal: despejar T de PV=nRT</span>
                <span class="chip" onclick="setInput(this)">¿Qué es la molaridad?</span>
            </div>`;
        chatBox.appendChild(welcome);
    }

    getUsedToday(user.uid).then(used => {
        if (used >= MAX_DAILY) {
            document.getElementById('user-input').disabled = true;
            document.getElementById('send-btn').disabled   = true;
            document.getElementById('user-input').placeholder = 'Límite diario alcanzado. Volvé mañana.';
        }
    });
}

function setInput(el) {
    const inp = document.getElementById('user-input');
    inp.value = el.textContent;
    inp.focus();
}

function escapeHtml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function addMessage(text, isUser=false, subject=null) {
    const box   = document.getElementById('chat-box');
    const row   = document.createElement('div');
    row.className = 'msg-row '+(isUser?'user':'stay');
    const av = document.createElement('div');
    av.className = 'msg-avatar '+(isUser?'user-av':'stay-av');
    av.textContent = isUser ? 'Vos' : 'ST';
    const bubble = document.createElement('div');
    bubble.className = 'bubble '+(isUser?'user':'stay');
    if (!isUser && subject) {
        const pill = document.createElement('div');
        pill.className = 'subj-pill '+subject;
        pill.textContent = SUBJ_LABELS[subject].toUpperCase();
        bubble.appendChild(pill);
    }
    const content = document.createElement('div');
    content.innerHTML = isUser ? escapeHtml(text) : marked.parse(text);
    bubble.appendChild(content);
    row.appendChild(av); row.appendChild(bubble);
    box.appendChild(row);
    box.scrollTop = box.scrollHeight;
}

function showTyping(){
    removeTyping();
    const box = document.getElementById('chat-box');
    const row = document.createElement('div');
    row.id='typing-row'; row.className='msg-row stay';
    row.innerHTML=`<div class="msg-avatar stay-av">ST</div><div class="bubble stay"><div class="typing-dots"><span></span><span></span><span></span></div></div>`;
    box.appendChild(row); box.scrollTop=box.scrollHeight;
}
function removeTyping(){ document.getElementById('typing-row')?.remove(); }

// auto-resize
document.getElementById('user-input').addEventListener('input',function(){
    this.style.height='auto';
    this.style.height=Math.min(this.scrollHeight,120)+'px';
});

async function handleSend() {
    const user = auth.currentUser;
    if (!user) return;
    const inp  = document.getElementById('user-input');
    const text = inp.value.trim();
    if (!text) return;

    const used = await getUsedToday(user.uid);
    if (used >= MAX_DAILY) {
        addMessage('⚠️ Alcanzaste el límite de '+MAX_DAILY+' consultas por hoy. Volvé mañana.',false,currentSubject);
        return;
    }

    const subj = currentSubject;
    addMessage(text, true);
    inp.value=''; inp.style.height='auto';
    showTyping();

    await incrementQuota(user.uid);
    const rem = await updateQuotaBadge(user.uid);
    if (rem === 0) {
        document.getElementById('user-input').disabled = true;
        document.getElementById('send-btn').disabled   = true;
    }

    try {
        const res = await fetch(WORKER_URL,{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({ question:text, system:SUBJ_PROMPTS[subj] })
        });
        const data = await res.json();
        removeTyping();
        if (data.error){ addMessage('⚠️ Error de IA: '+data.error.message,false,subj); return; }
        const answer = data.choices[0].message.content;
        const tokens = data.usage?.total_tokens || 0;
        addMessage(answer, false, subj);
        // Log en Firestore (sin await para no bloquear UI)
        logQuery(user, text, subj, tokens).catch(console.error);
    } catch(e) {
        removeTyping();
        addMessage('⚠️ Error de conexión: '+e.message,false,currentSubject);
    }
}

document.getElementById('send-btn').onclick = handleSend;
document.getElementById('user-input').addEventListener('keydown', e=>{
    if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();handleSend();}
});

// ── ADMIN PANEL ───────────────────────────────────────────────────────────────
async function showAdminPanel() {
    document.getElementById('chat-box').style.display    = 'none';
    document.getElementById('input-area').style.display  = 'none';
    const panel = document.getElementById('admin-panel');
    panel.style.display = 'flex';
    panel.innerHTML = `<div style="text-align:center;padding:40px;color:var(--muted);font-family:'Space Mono',monospace;font-size:13px;">Cargando datos…</div>`;
    await loadAdminData(panel);
}

async function loadAdminData(panel) {
    try {
        // Traer últimas 200 queries
        const snap = await db.collection('queries')
            .orderBy('timestamp','desc')
            .limit(200)
            .get();

        const queries = snap.docs.map(d=>d.data());
        const totalQ  = queries.length;
        const totalTok = queries.reduce((a,q)=>a+(q.tokens||0),0);
        const today = todayStr();
        const todayQ = queries.filter(q=>q.timestamp?.toDate()?.toISOString().slice(0,10)===today).length;
        const todayTok= queries.filter(q=>q.timestamp?.toDate()?.toISOString().slice(0,10)===today).reduce((a,q)=>a+(q.tokens||0),0);

        // Usuarios únicos
        const uids = [...new Set(queries.map(q=>q.uid))];

        // Por materia
        const bySubj = {fisica:0,quimica:0,fisq:0};
        queries.forEach(q=>{ if(bySubj[q.subject]!==undefined) bySubj[q.subject]++; });

        // Top usuarios (últimos 200)
        const userMap = {};
        queries.forEach(q=>{
            if(!userMap[q.uid]) userMap[q.uid]={email:q.email,name:q.name,count:0,tokens:0};
            userMap[q.uid].count++;
            userMap[q.uid].tokens+=(q.tokens||0);
        });
        const topUsers = Object.values(userMap).sort((a,b)=>b.count-a.count).slice(0,10);

        const maxSubj = Math.max(...Object.values(bySubj),1);

        panel.innerHTML = `
        <div class="admin-header">
            <div style="display:flex;align-items:center;gap:10px;">
                <h2>Panel Admin</h2>
                <span class="admin-badge">ADMIN</span>
            </div>
            <button class="admin-refresh" onclick="showAdminPanel()">↻ Actualizar</button>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="label">Consultas hoy</div>
                <div class="value">${todayQ}</div>
                <div class="sub-val">${totalQ} en total (últimas 200)</div>
            </div>
            <div class="stat-card">
                <div class="label">Tokens hoy</div>
                <div class="value">${todayTok.toLocaleString()}</div>
                <div class="sub-val">${totalTok.toLocaleString()} total</div>
            </div>
            <div class="stat-card">
                <div class="label">Usuarios únicos</div>
                <div class="value">${uids.length}</div>
                <div class="sub-val">en últimas 200 consultas</div>
            </div>
            <div class="stat-card">
                <div class="label">Tokens/consulta</div>
                <div class="value">${totalQ ? Math.round(totalTok/totalQ) : 0}</div>
                <div class="sub-val">promedio</div>
            </div>
        </div>

        <div class="admin-section">
            <h3>Uso por materia</h3>
            ${Object.entries(bySubj).map(([s,n])=>`
            <div style="margin-bottom:10px;">
                <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px;">
                    <span class="tag ${s}">${SUBJ_LABELS[s]}</span>
                    <span style="font-family:'Space Mono',monospace;">${n} consultas</span>
                </div>
                <div class="bar-wrap"><div class="bar-fill" style="width:${Math.round(n/maxSubj*100)}%"></div></div>
            </div>`).join('')}
        </div>

        <div class="admin-section">
            <h3>Top usuarios</h3>
            <table class="log-table">
                <thead><tr><th>Usuario</th><th>Email</th><th>Consultas</th><th>Tokens</th></tr></thead>
                <tbody>
                ${topUsers.map(u=>`
                    <tr>
                        <td>${u.name||'—'}</td>
                        <td style="color:var(--muted)">${u.email}</td>
                        <td style="font-family:'Space Mono',monospace">${u.count}</td>
                        <td style="font-family:'Space Mono',monospace">${(u.tokens||0).toLocaleString()}</td>
                    </tr>`).join('')}
                </tbody>
            </table>
        </div>

        <div class="admin-section">
            <h3>Últimas 50 consultas</h3>
            <table class="log-table">
                <thead><tr><th>Hora</th><th>Usuario</th><th>Materia</th><th>Consulta</th><th>Tokens</th></tr></thead>
                <tbody>
                ${queries.slice(0,50).map(q=>{
                    const ts = q.timestamp?.toDate();
                    const hora = ts ? ts.toLocaleString('es-AR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}) : '—';
                    return `<tr>
                        <td style="white-space:nowrap;font-family:'Space Mono',monospace;font-size:11px">${hora}</td>
                        <td style="color:var(--muted);font-size:11px">${q.name||q.email||'—'}</td>
                        <td><span class="tag ${q.subject||''}">${SUBJ_LABELS[q.subject]||q.subject||'—'}</span></td>
                        <td style="max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escapeHtml(q.question||'')}</td>
                        <td style="font-family:'Space Mono',monospace;font-size:11px">${q.tokens||0}</td>
                    </tr>`;
                }).join('')}
                </tbody>
            </table>
        </div>

        <div style="padding-bottom:20px;text-align:center;">
            <button class="btn-link" onclick="showChatFromAdmin()">← Volver al chat</button>
        </div>`;
    } catch(e) {
        panel.innerHTML = `<div style="padding:40px;text-align:center;color:var(--red)">Error cargando datos: ${e.message}</div>`;
    }
}

function showChatFromAdmin() {
    document.getElementById('admin-panel').style.display  = 'none';
    document.getElementById('chat-box').style.display     = 'flex';
    document.getElementById('input-area').style.display   = 'block';
}
</script>
