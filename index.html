<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EUREKA - Tutor de Exactas</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <style>
        :root { --accent: #2563eb; }
        body { font-family: 'Inter', sans-serif; transition: background-color 0.3s; }
        body.light { background-color: #f1f5f9; color: #1e293b; }
        body.dark { background-color: #0f172a; color: #f8fafc; }
        
        .glass { backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .light .glass { background: rgba(255, 255, 255, 0.8); }
        .dark .glass { background: rgba(30, 41, 59, 0.7); }
        
        /* ESTILOS PARA QUE LAS FÓRMULAS Y NEGRITAS SE VEAN BIEN */
        .chat-bubble-stay b, .chat-bubble-stay strong { font-weight: 800; color: #3b82f6; }
        .chat-bubble-stay ul { list-style-type: disc; margin-left: 1.5rem; margin-bottom: 1rem; }
        .chat-bubble-stay p { margin-bottom: 0.75rem; line-height: 1.5; }
        
        .chat-scroll { height: calc(100vh - 200px); scroll-behavior: smooth; }
        .fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="dark overflow-hidden">

    <header class="p-4 glass sticky top-0 z-50 flex justify-between items-center px-6 shadow-sm">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-blue-600 rounded-2xl flex items-center justify-center font-bold text-xl text-white shadow-lg shadow-blue-500/30">E</div>
            <div>
                <h1 style="font-family:'Space Grotesk'" class="text-xl font-bold tracking-tight leading-none">EUREKA</h1>
                <p class="text-[10px] text-blue-500 font-bold tracking-widest uppercase opacity-80">Tutor de Exactas</p>
            </div>
        </div>
        
        <div class="flex items-center gap-4">
            <button id="theme-toggle" class="p-2 rounded-xl hover:bg-slate-700 transition-colors text-lg">☀️</button>
            <div id="auth-section" class="relative">
                <button id="login-btn" class="bg-blue-600 hover:bg-blue-500 text-white px-5 py-2 rounded-xl text-sm font-bold transition-all shadow-md">CONECTAR</button>
            </div>
        </div>
    </header>

    <main class="max-w-4xl w-full mx-auto p-4">
        <div id="chat-box" class="chat-scroll overflow-y-auto space-y-6 pr-2 mb-4">
            <div class="flex flex-col items-start fade-in" id="system-msg">
                <span class="text-[10px] text-blue-500 font-bold mb-1 ml-2 uppercase">Stay // Sistema</span>
                <div class="chat-bubble-stay glass p-4 rounded-3xl rounded-tl-none max-w-[85%] text-sm border-l-4 border-blue-500 shadow-sm">
                    Iniciá sesión para activar el nexo STAY.
                </div>
            </div>
        </div>

        <div id="input-area" class="opacity-30 pointer-events-none transition-all duration-500 fixed bottom-6 left-4 right-4 max-w-4xl mx-auto">
            <div class="relative group">
                <input type="text" id="user-input" autocomplete="off" placeholder="Escribí tu duda aquí..." 
                       class="w-full bg-slate-800 border border-slate-700 rounded-2xl p-4 pr-16 focus:outline-none focus:ring-2 focus:ring-blue-500/50 text-white shadow-xl">
                <button id="send-btn" class="absolute right-2 top-2 bottom-2 bg-blue-600 hover:bg-blue-700 text-white px-5 rounded-xl transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z" /></svg>
                </button>
            </div>
        </div>
    </main>

    <script>
        // --- CONFIG ---
        const WORKER_URL = "https://eureka-proxy.fisicai-eureka-01.workers.dev"; // URL VERIFICADA
        
        const firebaseConfig = {
            apiKey: "AIzaSyCGTT2IwpD_L415hHW26UsCAp5PdjfEDqg",
            authDomain: "eureka-tutor.firebaseapp.com",
            projectId: "eureka-tutor",
            storageBucket: "eureka-tutor.firebasestorage.app",
            messagingSenderId: "305479110536",
            appId: "1:305479110536:web:6d4783301d188d1b30743d"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const provider = new firebase.auth.GoogleAuthProvider();

        const loginBtn = document.getElementById('login-btn');
        const themeToggle = document.getElementById('theme-toggle');
        const inputArea = document.getElementById('input-area');
        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');

        // PERSISTENCIA: Reconocer al usuario si ya entró
        auth.onAuthStateChanged((user) => {
            if (user) updateUI(user);
        });

        themeToggle.onclick = () => {
            document.body.classList.toggle('dark');
            document.body.classList.toggle('light');
            themeToggle.innerText = document.body.classList.contains('dark') ? '☀️' : '🌙';
        };

        loginBtn.onclick = () => auth.signInWithPopup(provider);

        function updateUI(user) {
            document.getElementById('auth-section').innerHTML = `
                <img src="${user.photoURL}" onclick="firebase.auth().signOut().then(()=>location.reload())" 
                     class="w-10 h-10 rounded-xl border-2 border-blue-500 cursor-pointer hover:scale-105 transition-all shadow-md" title="Cerrar sesión">`;
            inputArea.classList.remove('opacity-30', 'pointer-events-none');
            addStayMessage(`¡Sincronización establecida! Hola **${user.displayName.split(' ')[0]}**. ¿En qué puedo ayudarte hoy?`);
        }

        async function askGroq(question) {
            try {
                const response = await fetch(WORKER_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ question: question })
                });
                const data = await response.json();
                return data.choices[0].message.content;
            } catch (e) {
                console.error(e);
                return "Hubo un error al conectar con el servidor de IA.";
            }
        }

        function addStayMessage(text) {
            const div = document.createElement('div');
            div.className = 'flex flex-col items-start fade-in mb-4';
            // marked.parse(text) ES LO QUE CONVIERTE LOS ** EN NEGRITA
            div.innerHTML = `
                <span class="text-[10px] text-blue-500 font-bold mb-1 ml-2 uppercase">Stay // Nexo</span>
                <div class="chat-bubble-stay glass p-4 rounded-3xl rounded-tl-none max-w-[85%] text-sm border-l-4 border-blue-500 shadow-sm">
                    ${marked.parse(text)}
                </div>`;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function addUserMessage(text) {
            const div = document.createElement('div');
            div.className = 'flex justify-end fade-in mb-4';
            div.innerHTML = `<div class="bg-blue-600 text-white p-3 px-6 rounded-3xl rounded-tr-none max-w-[80%] text-sm shadow-md">${text}</div>`;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function handleSend() {
            const text = userInput.value.trim();
            if(!text) return;
            addUserMessage(text);
            userInput.value = '';
            
            const typingId = 'typing-' + Date.now();
            const typingDiv = document.createElement('div');
            typingDiv.id = typingId;
            typingDiv.className = 'flex flex-col items-start fade-in';
            typingDiv.innerHTML = `<span class="text-[10px] text-blue-500 font-bold mb-1 ml-2 uppercase">Stay // Pensando</span>
                                   <div class="chat-bubble-stay glass p-4 rounded-3xl rounded-tl-none text-xs animate-pulse italic">Analizando...</div>`;
            chatBox.appendChild(typingDiv);

            const answer = await askGroq(text);
            document.getElementById(typingId).remove();
            addStayMessage(answer);
        }

        document.getElementById('send-btn').onclick = handleSend;
        userInput.onkeypress = (e) => { if(e.key === 'Enter') handleSend(); };
    </script>
</body>
</html>
