<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EUREKA</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <style>
        /* MODO CLARO POR DEFECTO */
        body { background-color: #f8fafc; color: #1e293b; font-family: sans-serif; }
        .chat-container { height: calc(100vh - 180px); overflow-y: auto; }
        .bubble-stay { background: white; border-left: 4px solid #2563eb; padding: 1rem; border-radius: 0.5rem; shadow: 0 1px 2px rgba(0,0,0,0.05); }
        /* Estilo para que las negritas se vean */
        .bubble-stay strong, .bubble-stay b { font-weight: bold; color: #1d4ed8; }
    </style>
</head>
<body class="p-0 m-0">

    <header class="bg-white border-b p-4 flex justify-between items-center shadow-sm">
        <div class="flex items-center gap-2">
            <div class="bg-blue-600 text-white w-8 h-8 rounded flex items-center justify-center font-bold">E</div>
            <h1 class="font-bold text-xl">EUREKA</h1>
        </div>
        <div id="auth-area">
            <button id="login-btn" class="bg-blue-600 text-white px-4 py-2 rounded font-bold text-sm">CONECTAR</button>
        </div>
    </header>

    <main class="max-w-3xl mx-auto p-4">
        <div id="chat-box" class="chat-container space-y-4">
            <div id="welcome-msg" class="bubble-stay">
                Cargando sistema...
            </div>
        </div>

        <div id="input-area" class="fixed bottom-0 left-0 w-full bg-white p-4 border-t opacity-50 pointer-events-none">
            <div class="max-w-3xl mx-auto flex gap-2">
                <input type="text" id="user-input" placeholder="Escribí acá..." class="flex-1 border rounded p-2 outline-none focus:border-blue-500">
                <button id="send-btn" class="bg-blue-600 text-white px-6 rounded font-bold">ENVIAR</button>
            </div>
        </div>
    </main>

    <script>
        const WORKER_URL = "https://eureka-proxy.fisicai-eureka-01.workers.dev";
        
        const firebaseConfig = {
            apiKey: "AIzaSyCGTT2IwpD_L415hHW26UsCAp5PdjfEDqg",
            authDomain: "eureka-tutor.firebaseapp.com",
            projectId: "eureka-tutor",
            storageBucket: "eureka-tutor.firebasestorage.app",
            messagingSenderId: "305479110536",
            appId: "1:305479110536:web:6d4783301d188d1b30743d"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const provider = new firebase.auth.GoogleAuthProvider();

        // 1. Manejo de Inicio de Sesión y Persistencia
        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('auth-area').innerHTML = `
                    <div class="flex items-center gap-2">
                        <span class="text-xs font-bold">${user.displayName.split(' ')[0]}</span>
                        <img src="${user.photoURL}" id="logout" class="w-8 h-8 rounded-full cursor-pointer border hover:opacity-75" title="Salir">
                    </div>`;
                document.getElementById('input-area').classList.remove('opacity-50', 'pointer-events-none');
                document.getElementById('logout').onclick = () => auth.signOut().then(() => location.reload());
                setInitialMessage(`Sincronizado. Hola **${user.displayName.split(' ')[0]}**, soy STAY. El nexo de **Física y Química** está listo.`);
            } else {
                setInitialMessage("Hola. Por favor **Iniciá Sesión** con Google para usar el tutor.");
            }
        });

        document.getElementById('login-btn').onclick = () => auth.signInWithPopup(provider);

        function setInitialMessage(text) {
            document.getElementById('welcome-msg').innerHTML = marked.parse(text);
        }

        function addMessage(text, isUser = false) {
            const div = document.createElement('div');
            div.className = isUser ? "flex justify-end" : "flex justify-start";
            const inner = document.createElement('div');
            inner.className = isUser ? "bg-blue-600 text-white p-3 rounded-lg max-w-[80%]" : "bubble-stay max-w-[80%]";
            inner.innerHTML = isUser ? text : marked.parse(text);
            div.appendChild(inner);
            document.getElementById('chat-box').appendChild(div);
            document.getElementById('chat-box').scrollTop = document.getElementById('chat-box').scrollHeight;
        }

        async function handleSend() {
            const input = document.getElementById('user-input');
            const text = input.value.trim();
            if (!text) return;

            addMessage(text, true);
            input.value = '';

            // Mostrar estado "Pensando"
            const typing = document.createElement('div');
            typing.id = "typing";
            typing.className = "text-xs italic text-gray-500";
            typing.innerText = "STAY está analizando...";
            document.getElementById('chat-box').appendChild(typing);

            try {
                const response = await fetch(WORKER_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ question: text })
                });
                const data = await response.json();
                document.getElementById('typing').remove();
                addMessage(data.choices[0].message.content);
            } catch (e) {
                document.getElementById('typing').remove();
                addMessage("Error de conexión. Chequeá que el Worker esté activo.");
            }
        }

        document.getElementById('send-btn').onclick = handleSend;
        document.getElementById('user-input').onkeypress = (e) => { if(e.key === 'Enter') handleSend(); };
    </script>
</body>
</html>
